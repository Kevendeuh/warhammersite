<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion aux Archives Impériales — Espace Compte Space Maids</title>
    <meta name="description"
        content="Connectez-vous à votre compte Armurerie Impériale Space Maids pour accéder à vos commandes de figurines Warhammer 40K, votre historique et vos avantages impériaux." />
    <meta name="keywords" content="connexion Space Maids, compte Armurerie Impériale, accès archives Warhammer 40K" />
    <link rel="canonical" href="https://armurerie-space-maids.com/login" />
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body>

    <!-- Minimal nav -->
    <nav class="nav" role="navigation" aria-label="Navigation principale">
        <div class="nav-inner">
            <a href="/" class="nav-logo" aria-label="Retour à la boutique">
                <span class="logo-sigil" aria-hidden="true">⚙</span>
                <span>
                    ARMURERIE IMPÉRIALE
                    <span class="subtitle">Space Maids Division ✦ 40.000</span>
                </span>
            </a>
            <a href="/figurines" class="btn btn-outline" style="font-size:0.75rem;">← Figurines</a>
        </div>
    </nav>

    <!-- Auth card -->
    <main class="auth-page" id="main-content">
        <div class="auth-card fade-in">
            <div class="auth-header">
                <span class="auth-sigil" aria-hidden="true">🎀</span>
                <h1>ARCHIVES IMPÉRIALES</h1>
                <p>Identifiez-vous pour accéder aux archives de l'Adeptus Figurinae</p>
            </div>

            <!-- Tabs -->
            <div class="auth-tabs" role="tablist" aria-label="Connexion ou inscription">
                <button class="auth-tab active" id="tab-login" role="tab" aria-selected="true"
                    aria-controls="panel-login" type="button">
                    Connexion
                </button>
                <button class="auth-tab" id="tab-register" role="tab" aria-selected="false"
                    aria-controls="panel-register" type="button">
                    S'enrôler
                </button>
            </div>

            <!-- LOGIN FORM -->
            <div class="auth-form-panel active" id="panel-login" role="tabpanel" aria-labelledby="tab-login">
                <div class="auth-error" id="login-error" role="alert"></div>
                <div class="auth-success" id="login-success" role="status"></div>

                <form id="login-form" novalidate>
                    <div class="form-group">
                        <label class="form-label" for="login-email">Identifiant Imperial (Email)</label>
                        <input class="form-input" type="email" id="login-email" name="email"
                            placeholder="soldat@imperium.terra" autocomplete="email" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="login-password">Code d'Accès</label>
                        <input class="form-input" type="password" id="login-password" name="mot_de_passe"
                            placeholder="••••••••" autocomplete="current-password" required />
                    </div>
                    <button class="btn btn-gold" type="submit" id="login-btn"
                        style="width:100%; justify-content:center; margin-top:0.5rem;">
                        SE CONNECTER AUX ARCHIVES
                    </button>
                </form>

                <p style="text-align:center; font-size:0.75rem; color:var(--text-secondary); margin-top:1rem;">
                    Pas encore enrôlé ?
                    <a href="#" id="goto-register" style="color:var(--text-pink)">Rejoindre les rangs</a>
                </p>
            </div>

            <!-- REGISTER FORM -->
            <div class="auth-form-panel" id="panel-register" role="tabpanel" aria-labelledby="tab-register">
                <div class="auth-error" id="register-error" role="alert"></div>
                <div class="auth-success" id="register-success" role="status"></div>

                <form id="register-form" novalidate>
                    <div class="form-grid-2">
                        <div class="form-group">
                            <label class="form-label" for="reg-nom">Nom</label>
                            <input class="form-input" type="text" id="reg-nom" name="nom" placeholder="Ex: Chevalière"
                                autocomplete="family-name" required />
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="reg-prenom">Prénom</label>
                            <input class="form-input" type="text" id="reg-prenom" name="prenom" placeholder="Ex: Nekona"
                                autocomplete="given-name" required />
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="reg-email">Email Impérial</label>
                        <input class="form-input" type="email" id="reg-email" name="email"
                            placeholder="soldat@imperium.terra" autocomplete="email" required />
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="reg-adresse">Adresse de la Ruche</label>
                        <input class="form-input" type="text" id="reg-adresse" name="adresse_postale"
                            placeholder="Niveau 42, Tour Est, Hive Primus..." autocomplete="street-address" />
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="reg-password">Code d'Accès</label>
                        <input class="form-input" type="password" id="reg-password" name="mot_de_passe"
                            placeholder="Min. 6 caractères" autocomplete="new-password" required minlength="6" />
                    </div>

                    <button class="btn btn-pink" type="submit" id="register-btn"
                        style="width:100%; justify-content:center; margin-top:0.5rem;">
                        🌸 S'ENRÔLER DANS LES ARCHIVES
                    </button>
                </form>

                <p style="text-align:center; font-size:0.75rem; color:var(--text-secondary); margin-top:1rem;">
                    Déjà enrôlé ?
                    <a href="#" id="goto-login" style="color:var(--text-gold)">Se connecter</a>
                </p>
            </div>

        </div>
    </main>

    <div class="toast" id="toast" role="alert" aria-live="assertive">
        <span class="toast-icon" id="toast-icon"></span>
        <span id="toast-msg"></span>
    </div>

    <script src="/js/auth.js"></script>
</body>

</html>
